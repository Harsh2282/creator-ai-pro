<!DOCTYPE html>
<html>
<head>
  <title>Creator AI Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;
      font-size: 16px;
    }

    button {
      padding: 12px 25px;
      border-radius: 8px;
      border: none;
      background: red;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 30px;
      background: #111;
      padding: 20px;
      border-radius: 12px;
      white-space: pre-wrap;
      text-align: left;
    }
  </style>
</head>
<body>

<h1>🔥 Creator AI Pro</h1>

<input type="text" id="topic" placeholder="Enter your video topic...">

<br>

<button onclick="analyze()">Analyze Trend</button>

<div id="result"></div>

<script>
async function analyze() {

  const topic = document.getElementById("topic").value;
  const resultDiv = document.getElementById("result");

  if (!topic) {
    resultDiv.innerHTML = "Please enter a topic.";
    return;
  }

  resultDiv.innerHTML = "Analyzing with Real AI + YouTube Trends... ⏳";

  try {
    const response = await fetch(`/api/viral?topic=${encodeURIComponent(topic)}`);
    const data = await response.json();

    resultDiv.innerHTML = data.result;

  } catch (error) {
    resultDiv.innerHTML = "Error connecting to AI system.";
  }
}
</script>

</body>
</html>
