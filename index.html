<!DOCTYPE html>
<html>
<head>
  <title>Viral Video AI Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #38bdf8;
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      white-space: pre-wrap;
      text-align: left;
    }
  </style>
</head>
<body>

<h1>🔥 Viral Video AI Studio</h1>

<input type="text" id="topic" placeholder="Enter your video topic...">

<button onclick="generate()">Generate Viral Plan</button>

<div id="result"></div>

<script>
async function generate() {
  const topic = document.getElementById("topic").value;
  const resultDiv = document.getElementById("result");

  resultDiv.innerHTML = "Generating... ⏳";

  try {
    const response = await fetch(`/api/viral?topic=${encodeURIComponent(topic)}`);
    const data = await response.json();

    resultDiv.innerHTML = data.result;
  } catch (error) {
    resultDiv.innerHTML = "Error connecting to AI.";
  }
}
</script>

</body>
</html>
